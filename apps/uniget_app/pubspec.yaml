name: uniget_app
description: UNIGET — the runnable app shell. Composition root for DI and routing; contains no business logic of its own, only wiring for the feature packages.
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.19.0'
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^8.1.6
  get_it: ^7.7.0
  injectable: ^2.4.2
  go_router: ^14.2.7
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  supabase_flutter: ^2.8.0

  core:
    path: ../../packages/core
  design_system:
    path: ../../packages/design_system
  feature_auth:
    path: ../../packages/features/feature_auth
  feature_asset_management:
    path: ../../packages/features/feature_asset_management
  feature_gate_pass:
    path: ../../packages/features/feature_gate_pass
  feature_visitor_management:
    path: ../../packages/features/feature_visitor_management

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.12
  injectable_generator: ^2.6.2
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
