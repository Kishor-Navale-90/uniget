version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.19.0'
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  fpdart: ^1.1.0
  get_it: ^7.7.0
  injectable: ^2.4.2
  dio: ^5.5.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  go_router: ^14.2.7
  core:
    path: ../../core
  design_system:
    path: ../../design_system

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.4.12
  injectable_generator: ^2.6.2
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  very_good_analysis: ^6.0.0
