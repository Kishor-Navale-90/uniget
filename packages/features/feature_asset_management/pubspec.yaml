name: feature_asset_management
description: >
  Asset Register & Lifecycle Management — the reference feature module.
  Every other feature package (gate_pass, visitor_management, and any of
  the 100+ screens beyond them) should be structured identically to this
  one: data/domain/presentation, offline-first repository, one Bloc per
  screen-slice, one UseCase per action.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.19.0'
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  fpdart: ^1.1.0
  get_it: ^7.7.0
  injectable: ^2.4.2
  dio: ^5.5.0
  drift: ^2.19.0
  uuid: ^4.5.1
  core:
    path: ../../core
  design_system:
    path: ../../design_system

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.4.12
  injectable_generator: ^2.6.2
  drift_dev: ^2.19.0
  very_good_analysis: ^6.0.0
