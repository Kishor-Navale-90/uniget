name: core
description: Cross-cutting infrastructure shared by every UNIGET feature package (error handling, networking, offline database, sync engine, DI, theming).
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.19.0'
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  # Functional error handling (Either<Failure, T>) instead of throwing across layers
  fpdart: ^1.1.0
  # DI
  get_it: ^7.7.0
  injectable: ^2.4.2
  # Networking
  dio: ^5.5.0
  connectivity_plus: ^6.0.5
  # Push notifications (Notification Service — concept doc's shared
  # core-engine component)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  # Offline-first local database (works on mobile, desktop AND web via sqlite3/wasm)
  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  # Secure session/token storage
  flutter_secure_storage: ^9.2.2
  # Immutable models/entities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  # Logging
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  injectable_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.19.0
  very_good_analysis: ^6.0.0
  mocktail: ^1.0.4
